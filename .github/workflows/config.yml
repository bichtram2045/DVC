name: CI

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Start Healenium (docker-compose)
        run: |
          docker compose -f ./infra/docker-compose-web.yaml up -d
          docker ps

      - name: Start Selenium Standalone Chrome
        run: |
          docker pull selenium/standalone-chrome
          docker run -d \
            -p 4444:4444 \
            --shm-size="2g" \
            selenium/standalone-chrome

      - name: Wait for services
        run: sleep 20

      - name: Run TestNG testcases
        env:
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USERNAME }}
          TESTRAIL_PASS: ${{ secrets.TESTRAIL_PASSWORD }}
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
        run: mvn clean test

      - name: Stop containers
        if: always()
        run: |
          docker ps
          docker compose -f infra/docker-compose-web.yaml down
          docker stop $(docker ps -q) || true
